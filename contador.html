<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contador interativo com botões para incrementar, decrementar e zerar">
    <title>Contador Interativo</title>
    <style>
        /* Reset e base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        /* Container principal */
        .counter-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 32px;
            font-weight: 700;
        }

        /* Display do valor */
        .counter-value {
            font-size: 72px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            transition: transform 0.2s ease;
        }

        .counter-value.value-changed {
            animation: highlight 0.3s ease;
        }

        @keyframes highlight {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
                color: #764ba2;
            }
        }

        /* Container dos botões */
        .buttons-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        /* Estilo base dos botões */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            min-width: 100px;
            outline: none;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:focus-visible {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }

        /* Cores específicas dos botões */
        .btn-increment {
            background-color: #10b981;
        }

        .btn-decrement {
            background-color: #f59e0b;
        }

        .btn-reset {
            background-color: #ef4444;
        }

        /* Footer */
        footer {
            margin-top: 32px;
            color: #666;
            font-size: 14px;
        }

        /* Responsividade para telas pequenas */
        @media (max-width: 480px) {
            .counter-container {
                padding: 24px;
            }

            header h1 {
                font-size: 22px;
            }

            .counter-value {
                font-size: 56px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 16px;
                min-width: 80px;
            }

            .buttons-container {
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <main class="counter-container">
        <header>
            <h1>Contador Interativo</h1>
        </header>

        <div id="counterValue" class="counter-value" aria-live="polite">0</div>

        <div class="buttons-container">
            <button
                id="btnDecrement"
                class="btn btn-decrement"
                aria-label="Decrementar valor"
                type="button">
                ➖ -1
            </button>
            <button
                id="btnReset"
                class="btn btn-reset"
                aria-label="Zerar valor"
                type="button">
                🔄 Zerar
            </button>
            <button
                id="btnIncrement"
                class="btn btn-increment"
                aria-label="Incrementar valor"
                type="button">
                ➕ +1
            </button>
        </div>

        <footer>
            <p>Use os botões para controlar o contador</p>
        </footer>
    </main>

    <script>
        'use strict';

        // Variável de estado
        let count = 0;
        const MIN_VALUE = -999;

        // Seleção de elementos
        const counterValue = document.getElementById('counterValue');
        const btnIncrement = document.getElementById('btnIncrement');
        const btnDecrement = document.getElementById('btnDecrement');
        const btnReset = document.getElementById('btnReset');

        // Função para atualizar o display
        function updateDisplay() {
            counterValue.textContent = count;

            // Adicionar classe de animação
            counterValue.classList.add('value-changed');

            // Remover classe após a animação completar
            setTimeout(() => {
                counterValue.classList.remove('value-changed');
            }, 300);
        }

        // Função para incrementar
        function increment() {
            count += 1;
            updateDisplay();
        }

        // Função para decrementar
        function decrement() {
            if (count > MIN_VALUE) {
                count -= 1;
                updateDisplay();
            }
        }

        // Função para zerar
        function reset() {
            count = 0;
            updateDisplay();
        }

        // Event Listeners para clique
        btnIncrement.addEventListener('click', increment);
        btnDecrement.addEventListener('click', decrement);
        btnReset.addEventListener('click', reset);

        // Suporte a teclado (Enter e Space)
        btnIncrement.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                increment();
            }
        });

        btnDecrement.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                decrement();
            }
        });

        btnReset.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                reset();
            }
        });

        // Inicialização
        updateDisplay();
    </script>
</body>
</html>
