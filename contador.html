<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Simples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        main {
            background: white;
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 72px;
            font-weight: bold;
            color: #333;
            margin-bottom: 2rem;
            min-width: 200px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button:focus {
            outline: 3px solid #667eea;
            outline-offset: 3px;
        }

        @media (max-width: 600px) {
            main {
                padding: 2rem;
                margin: 1rem;
            }

            h1 {
                font-size: 48px;
            }

            button {
                font-size: 1rem;
                padding: 0.8rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1 id="contador-valor" aria-live="polite">0</h1>
        <button id="btn-incrementar" aria-label="Incrementar contador em 1">
            Somar +1
        </button>
    </main>

    <script>
        // Estado inicial do contador
        let contador = 0;

        // Seleção de elementos do DOM
        const valorElemento = document.getElementById('contador-valor');
        const botaoIncrementar = document.getElementById('btn-incrementar');

        // Função para incrementar o contador
        const incrementarContador = () => {
            contador += 1;
            valorElemento.textContent = contador;
        };

        // Event listener para o clique no botão
        botaoIncrementar.addEventListener('click', incrementarContador);
    </script>
</body>
</html>
