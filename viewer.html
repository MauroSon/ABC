<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synkrony ABC - Visualizador de Cores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            padding: 2rem;
        }

        body.theme-default {
            background-color: #2C3E50;
            color: #ECF0F1;
        }

        body.theme-light {
            background-color: #FFFFFF;
            color: #2C3E50;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid currentColor;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .theme-toggle {
            padding: 0.75rem 1.5rem;
            border: 2px solid currentColor;
            background: transparent;
            color: inherit;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            opacity: 0.8;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .color-card {
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .color-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .color-letter {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
        }

        .color-name {
            font-size: 1.1rem;
            font-weight: 500;
            opacity: 0.9;
        }

        .color-hex {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .legend {
            margin-top: 3rem;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid currentColor;
            opacity: 0.7;
        }

        .legend h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .legend p {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .color-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 1rem;
            }

            .color-letter {
                font-size: 3rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body class="theme-default">
    <div class="container">
        <header>
            <h1>Synkrony ABC - Paleta de Cores</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
                Tema Claro
            </button>
        </header>

        <div class="color-grid" id="colorGrid"></div>

        <div class="legend">
            <h2>Sobre o Sistema de Cores</h2>
            <p>Este visualizador apresenta a paleta de cores oficial do projeto Synkrony ABC. Cada arquivo (A, B, C, D, E, F, J, K, Y) possui uma cor única que o identifica visualmente. Clique no botão acima para alternar entre os temas claro e escuro.</p>
        </div>
    </div>

    <script>
        const colorsData = {
            "metadata": {
                "version": "1.0.0",
                "project": "Synkrony ABC",
                "lastUpdated": "2026-03-18"
            },
            "palette": {
                "A": { "hex": "#FF6B6B", "name": "Coral Red" },
                "B": { "hex": "#4ECDC4", "name": "Turquoise" },
                "C": { "hex": "#45B7D1", "name": "Sky Blue" },
                "D": { "hex": "#96CEB4", "name": "Sage Green" },
                "E": { "hex": "#FFEAA7", "name": "Warm Yellow" },
                "F": { "hex": "#DDA0DD", "name": "Plum" },
                "J": { "hex": "#98D8C8", "name": "Mint" },
                "K": { "hex": "#F7DC6F", "name": "Golden" },
                "Y": { "hex": "#BB8FCE", "name": "Lavender" }
            },
            "themes": {
                "default": { "background": "#2C3E50", "text": "#ECF0F1" },
                "light": { "background": "#FFFFFF", "text": "#2C3E50" }
            }
        };

        function getContrastColor(hexColor) {
            const r = parseInt(hexColor.slice(1, 3), 16);
            const g = parseInt(hexColor.slice(3, 5), 16);
            const b = parseInt(hexColor.slice(5, 7), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5 ? '#000000' : '#FFFFFF';
        }

        function createColorCards() {
            const grid = document.getElementById('colorGrid');
            const letters = Object.keys(colorsData.palette).sort();

            letters.forEach(letter => {
                const color = colorsData.palette[letter];
                const textColor = getContrastColor(color.hex);

                const card = document.createElement('div');
                card.className = 'color-card';
                card.style.backgroundColor = color.hex;
                card.style.color = textColor;

                card.innerHTML = `
                    <div class="color-letter">${letter}</div>
                    <div class="color-name">${color.name}</div>
                    <div class="color-hex">${color.hex}</div>
                `;

                grid.appendChild(card);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const button = document.getElementById('themeToggle');

            if (body.classList.contains('theme-default')) {
                body.classList.remove('theme-default');
                body.classList.add('theme-light');
                button.textContent = 'Tema Escuro';
            } else {
                body.classList.remove('theme-light');
                body.classList.add('theme-default');
                button.textContent = 'Tema Claro';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            createColorCards();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        });
    </script>
</body>
</html>
