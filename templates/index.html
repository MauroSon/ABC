<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Simples</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full mx-auto transform transition-all duration-300 hover:scale-105">
        <!-- Título -->
        <h1 class="text-4xl font-bold text-center text-gray-800 mb-8">
            Contador Simples
        </h1>

        <!-- Display do Contador -->
        <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-xl p-8 mb-8 shadow-lg">
            <div class="text-center">
                <span class="text-8xl sm:text-9xl font-bold text-white drop-shadow-lg">
                    {{ contador }}
                </span>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
            <!-- Botão Decrementar -->
            <form action="/decrementar" method="POST" class="w-full sm:w-auto">
                <button
                    type="submit"
                    class="w-full sm:w-auto bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-bold py-4 px-8 rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-red-300 focus:ring-offset-2 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="text-2xl">-1</span>
                </button>
            </form>

            <!-- Botão Zerar -->
            <form action="/zerar" method="POST" class="w-full sm:w-auto">
                <button
                    type="submit"
                    class="w-full sm:w-auto bg-gray-500 hover:bg-gray-600 active:bg-gray-700 text-white font-bold py-4 px-8 rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-gray-300 focus:ring-offset-2 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="text-xl">Zerar</span>
                </button>
            </form>

            <!-- Botão Incrementar -->
            <form action="/incrementar" method="POST" class="w-full sm:w-auto">
                <button
                    type="submit"
                    class="w-full sm:w-auto bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-bold py-4 px-8 rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-green-300 focus:ring-offset-2 shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="text-2xl">+1</span>
                </button>
            </form>
        </div>

        <!-- Informação Adicional -->
        <p class="text-center text-gray-500 mt-8 text-sm">
            Use os botões para incrementar, decrementar ou zerar o contador
        </p>
    </div>
</body>
</html>
